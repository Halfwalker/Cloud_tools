---

- name: Prepare
  hosts: all
  gather_facts: false

  tasks:

    - name: Add testing user
      user:
        name: testing
        comment: Test user for cloud_tools

    - name: Install ZSH
      apt:
        state: present
        update_cache: yes
        name:
          - zsh

    - name: Create blank /root/.zshrc
      file:
        path: "/root/.zshrc"
        owner: root
        group: root
        mode: 0644
        state: touch

---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: "${DRONE_REPO_NAME}-${MOLECULE_DISTRO:-ubuntu2004}"
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2004}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        vault_github_auth:
          name: $GH_USER
          token: $GH_TOKEN
        # Create a testing user in molecule/default/prepare.yml
        username: testing
  env:
    GH_USER: ${GH_USER:-""}
    GH_TOKEN: ${GH_TOKEN:-""}

verifier:
  name: goss
  env:
    GH_USER: ${GH_USER:-""}
    GH_TOKEN: ${GH_TOKEN:-""}

scenario:
  name: default
  test_sequence:
    - lint
    - destroy
    # - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    # - side_effect
    - verify
    - destroy
